# =============================================================================
# nginx config — Local Docker Compose testing
# =============================================================================
# Overrides the production config (which returns 404 for /api/) to instead
# proxy /api/* requests to the backend container.
#
# The backend container is reachable via its Docker Compose service name:
#   http://backend:3000
# =============================================================================

server {
  listen 3000;
  root /usr/share/nginx/html;
  index index.html;

  # Health endpoints (same as production)
  location /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
  location /readyz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Proxy /api/* requests to the backend container
  # Includes WebSocket support (used by backend for real-time guest timer updates)
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # WebSocket connections (served from /api/ws on the backend)
  location /ws {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
  }

  # SPA fallback: all other routes → index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
