# =============================================================================
# nginx main config — Local Docker Compose testing
# =============================================================================
# Overrides the default /etc/nginx/nginx.conf to write the PID file to /tmp
# (the 'nginx' user cannot write to /var/run/nginx.pid).
# =============================================================================

worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  # Basic HTTP-level settings
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Log format
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /dev/stdout main;
  error_log /dev/stderr warn;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Include our custom server config from conf.d
  include /etc/nginx/conf.d/*.conf;
}
