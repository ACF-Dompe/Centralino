# =============================================================================
# Docker Security — Vulnerability Scan (Trivy)
# =============================================================================
# Builds backend and frontend Docker images and scans them with Trivy for
# CRITICAL vulnerabilities (HIGH logged as warnings). Results are uploaded
# to the GitHub Security tab (Code Scanning).
#
# Unlike the deploy pipeline (deploy-azure.yml), this workflow:
#   - Runs on EVERY push (not just deployable branches)
#   - Does NOT push images to ACR (no Azure OIDC required)
#   - Does NOT block the deploy pipeline — it's a gating signal
# =============================================================================

name: Docker Security — Trivy Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: docker-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-scan:
    name: 'Build + Trivy scan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - verify .trivyignore
        run: ls -la .trivyignore && echo '---' && head -5 .trivyignore

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build backend (tsc)
        run: npm run build -w backend

      - name: Build frontend (vite)
        run: npm run build -w frontend

      # ── Build Docker images ──────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: cgd-backend:ci-${{ github.sha }}
          no-cache: true
          pull: true

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: cgd-frontend:ci-${{ github.sha }}
          no-cache: true
          pull: true

      # ── Trivy scans (direct via Docker) ────────────────────────────
      # Using `docker run` instead of the action wrapper gives full control
      # over Trivy flags, visible logs, and explicit --ignorefile support.
      # The aquasecurity/trivy-action wrapper was abandoned due to opaque
      # outcome reporting and untestable log behavior.

      - name: Trivy vulnerability scan (backend image)
        id: trivy-backend
        run: |
          mkdir -p trivy-output
          # Run Trivy with exit-code 1 (exits 1 if CRITICAL found).
          # &&/|| pattern sets GITHUB_ENV based on exit code.
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}/.trivyignore":/.trivyignore:ro \
            -v "${PWD}/trivy-output":/output \
            aquasec/trivy:0.70.0 \
            image \
            --severity CRITICAL \
            --ignorefile /.trivyignore \
            --exit-code 1 \
            --format sarif \
            --output /output/trivy-backend-results.sarif \
            'cgd-backend:ci-${{ github.sha }}' \
          && { echo "BACKEND_HAS_VULNS=no" >> "$GITHUB_ENV"; echo "No CRITICAL vulnerabilities in backend image."; } \
          || { echo "BACKEND_HAS_VULNS=yes" >> "$GITHUB_ENV"; echo "CRITICAL vulnerabilities found in backend image!"; }

      - name: Trivy vulnerability scan (frontend image)
        id: trivy-frontend
        run: |
          mkdir -p trivy-output
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}/.trivyignore":/.trivyignore:ro \
            -v "${PWD}/trivy-output":/output \
            aquasec/trivy:0.70.0 \
            image \
            --severity CRITICAL \
            --ignorefile /.trivyignore \
            --exit-code 1 \
            --format sarif \
            --output /output/trivy-frontend-results.sarif \
            'cgd-frontend:ci-${{ github.sha }}' \
          && { echo "FRONTEND_HAS_VULNS=no" >> "$GITHUB_ENV"; echo "No CRITICAL vulnerabilities in frontend image."; } \
          || { echo "FRONTEND_HAS_VULNS=yes" >> "$GITHUB_ENV"; echo "CRITICAL vulnerabilities found in frontend image!"; }

      # ── Upload results to GitHub Security tab ────────────────────────

      - name: Upload backend SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-output/trivy-backend-results.sarif'
          category: trivy-backend

      - name: Upload frontend SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-output/trivy-frontend-results.sarif'
          category: trivy-frontend

      # ── Gate: fail the workflow if any CRITICAL vulnerability found ──

      - name: Fail if CRITICAL vulnerabilities found
        if: always()
        run: |
          echo "Backend has CRITICAL vulns: ${{ env.BACKEND_HAS_VULNS }}"
          echo "Frontend has CRITICAL vulns: ${{ env.FRONTEND_HAS_VULNS }}"
          if [[ "${{ env.BACKEND_HAS_VULNS }}" == "yes" || "${{ env.FRONTEND_HAS_VULNS }}" == "yes" ]]; then
            echo "ERROR: CRITICAL vulnerabilities found in Docker images!"
            exit 1
          fi
          echo "OK: No CRITICAL vulnerabilities found."
