# =============================================================================
# Docker Security — Vulnerability Scan (Trivy)
# =============================================================================
# Builds backend and frontend Docker images and scans them with Trivy for
# CRITICAL and HIGH vulnerabilities. Results are uploaded to the GitHub
# Security tab (Code Scanning).
#
# Unlike the deploy pipeline (deploy-azure.yml), this workflow:
#   - Runs on EVERY push (not just deployable branches)
#   - Does NOT push images to ACR (no Azure OIDC required)
#   - Does NOT block the deploy pipeline — it's a gating signal
# =============================================================================

name: Docker Security — Trivy Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: docker-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-scan:
    name: 'Build + Trivy scan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build backend (tsc)
        run: npm run build -w backend

      - name: Build frontend (vite)
        run: npm run build -w frontend

      # ── Build Docker images ──────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: cgd-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: cgd-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy scans ──────────────────────────────────────────────────

      - name: Trivy vulnerability scan (backend image)
        id: trivy-backend
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'cgd-backend:ci-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Trivy vulnerability scan (frontend image)
        id: trivy-frontend
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'cgd-frontend:ci-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # ── Upload results to GitHub Security tab ────────────────────────

      - name: Upload backend SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: trivy-backend

      - name: Upload frontend SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: trivy-frontend

      # ── Gate: fail the workflow if any scan found vulnerabilities ────

      - name: Fail if CRITICAL/HIGH vulnerabilities found
        if: steps.trivy-backend.outcome == 'failure' || steps.trivy-frontend.outcome == 'failure'
        run: exit 1
