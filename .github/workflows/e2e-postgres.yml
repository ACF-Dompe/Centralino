name: E2E (Playwright)

# Thin caller for the reusable E2E workflow.
# Runs the Playwright suite against the PostgreSQL backend.
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    uses: ./.github/workflows/e2e-reusable.yml
