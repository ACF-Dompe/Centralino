# =============================================================================
# Azure Platform Preflight (READ-ONLY, manual via workflow_dispatch)
# =============================================================================
# Operating model: CONSUME-ONLY. This workflow does NOT provision anything.
# It runs `scripts/provision.sh` (a read-only preflight) to VERIFY that the
# platform-provided Azure resources exist and to print the configuration map
# (env var → Key Vault reference) for the infrastructure team.
#
# All resource names are PARAMETRIZED via GitHub secrets (supplied by the
# infrastructure team): RG_NAME, KV_NAME, ACA_ENV_NAME, ACA_BACKEND_NAME,
# ACA_FRONTEND_NAME, MIGRATION_JOB_NAME, UAMI_BACKEND_NAME, UAMI_FRONTEND_NAME,
# ACR_NAME, POSTGRES_SERVER_NAME.
#
# Usage:
#   1. GitHub → Actions → "Azure Platform Preflight"
#   2. Run workflow → select environment
#   3. Review the verification output and configuration map
# =============================================================================

name: Azure Platform Preflight

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prod

jobs:
  preflight:
    name: 'Preflight ${{ github.event.inputs.environment }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify platform resources (read-only)
        env:
          RG_NAME: ${{ secrets.RG_NAME }}
          KV_NAME: ${{ secrets.KV_NAME }}
          ACA_ENV_NAME: ${{ secrets.ACA_ENV_NAME }}
          ACA_BACKEND_NAME: ${{ secrets.ACA_BACKEND_NAME }}
          ACA_FRONTEND_NAME: ${{ secrets.ACA_FRONTEND_NAME }}
          MIGRATION_JOB_NAME: ${{ secrets.MIGRATION_JOB_NAME }}
          UAMI_BACKEND_NAME: ${{ secrets.UAMI_BACKEND_NAME }}
          UAMI_FRONTEND_NAME: ${{ secrets.UAMI_FRONTEND_NAME }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
          PG_SERVER_NAME: ${{ secrets.POSTGRES_SERVER_NAME }}
        run: bash scripts/provision.sh "${{ github.event.inputs.environment }}"
