# =============================================================================
# Azure Container Platform — Standard CI/CD Pipeline (5-Stage)
# =============================================================================
# Standard pipeline per le applicazioni sulla piattaforma Azure Container.
# Triggered on push to main/staging branches or via workflow_dispatch.
#
# Stages:
#   1. Build & Vulnerability Scan (typecheck + compile + Trivy)
#   2. Database Bootstrap + Migration Job (idempotent via ACA job)
#   3. Database Migration (idempotent)
#   4. Deploy to ACA (container app update)
#   5. Post-deploy Verify (informational — internal-only apps, no public probe)
#
# Architecture:
#   - ACR with immutable tags (<git-sha>) + mutable aliases (:dev, :stg, :prod)
#   - ACA internal-only environment (no public ingress)
#   - Application Gateway (WAF v2) routes /api/* → backend, /* → frontend
#   - Managed Identity (UAMI) per container app
#   - Key Vault references for secrets
#
# ── Required GitHub Secrets ──────────────────────────────────────────────────
# These secrets MUST be configured in your GitHub repository:
#   Settings → Secrets and variables → Actions → Repository secrets
#
#   ACA_ENVIRONMENT_DEFAULT_DOMAIN  ACA env default domain (resolve from Azure Portal:
#                                   Container Apps Environment → Default Domain)
#                                   Example: icydune-01234567.westeurope.azurecontainerapps.io
#   ACR_NAME                        Azure Container Registry name (e.g. crguestportaldev)
#   AZURE_CLIENT_ID                 Service principal / OIDC client ID (federated credential)
#   AZURE_TENANT_ID                 Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID           Azure subscription ID
#   DATABASE_URL                    PostgreSQL connection string (Entra ID, no password).
#                                   The user MUST be the backend UAMI name, e.g.
#                                   postgres://uami-guestportal-backend-prod@<host>...:5432/guestportal_prod
#   POSTGRES_SERVER_NAME            PostgreSQL Flexible Server name
#   POSTGRES_ADMIN_USER             PostgreSQL Entra admin (used only to bootstrap DB + principal)
#   SAML_ENTRY_POINT                Entra ID SAML SSO endpoint URL
#   SAML_ISSUER                     Application Entity ID
#   SAML_CALLBACK_URL               ACS callback URL
#   MAIL_GRAPH_CLIENT_ID            Graph API App Registration client ID (for email)
#   MAIL_GRAPH_USER_ID              Graph API mailbox user ID/UPN (for email)
# =============================================================================
# ── ACA Environment Variables (set by pipeline via --set-env-vars) ───────────
# The deploy step sets these on the backend ACA container app. Secrets that
# should come from Key Vault use the @Microsoft.KeyVault(...) reference format.
#
#   DATABASE_URL                     From GitHub secret (plain URL, no password)
#   SESSION_SECRET                   Key Vault reference
#   SAML_ENTRY_POINT                 From GitHub secret (non-secret URL)
#   SAML_ISSUER                      From GitHub secret (non-secret URI)
#   SAML_CALLBACK_URL                From GitHub secret (non-secret URL)
#   SAML_CERT                        Key Vault reference
#   SAML_DECRYPTION_KEY              Key Vault reference (optional)
#   SAML_LOGOUT_URL                  Key Vault reference (optional)
#   SAML_LOGOUT_CALLBACK_URL         Key Vault reference (optional)
#   WLC_DEFAULT_PASSWORD             Key Vault reference
#   APPLICATIONINSIGHTS_CONNECTION_STRING  Key Vault reference (optional)
#   BACKEND_BASE_URL                 Built from ACA_ENVIRONMENT_DEFAULT_DOMAIN
#   NODE_ENV, PORT, LOG_LEVEL        Plain values
#   SKIP_MIGRATIONS, SEED_ENABLED    Plain values (true and false by default — CI handles migrations)
#
#   MAIL_GRAPH_ENABLED               Plain value (false by default)
#   MAIL_GRAPH_TENANT_ID             From GitHub secret (reuses AZURE_TENANT_ID)
#   MAIL_GRAPH_CLIENT_ID             From GitHub secret
#   MAIL_GRAPH_CLIENT_SECRET         Key Vault reference
#   MAIL_GRAPH_USER_ID               From GitHub secret
#   MAIL_GRAPH_FROM_ADDRESS          Plain value

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - '*.md'
      - '.github/workflows/e2e-*.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev, staging, or production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - production
  workflow_call:
    inputs:
      environment:
        description: 'Target environment suffix (dev, stg, or prod)'
        required: true
        type: string

env:
  # ---- Environment suffix: resolves to (dev|stg|prod) ----
  # NOTE: Only ENV_SUFFIX, IMAGE_TAG, BACKEND_IMAGE_NAME, FRONTEND_IMAGE_NAME
  # are defined here because they only use `github` / `inputs` contexts.
  # Env vars that reference `env.*`, `secrets.*`, or combine multiple
  # contexts are defined in each job's `env` section where those contexts
  # ARE supported.
  ENV_SUFFIX: ${{ github.event_name == 'workflow_call' && inputs.environment || github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'dev' && 'dev' || github.event.inputs.environment == 'staging' && 'stg' || 'prod') || (github.ref_name == 'main' && 'prod' || 'stg') }}

  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE_NAME: guestportal-backend
  FRONTEND_IMAGE_NAME: guestportal-frontend

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build & Vulnerability Scan (typecheck + compile + Trivy)
  # ---------------------------------------------------------------------------
  build-and-scan:
    name: '1/5 Build & Scan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      BACKEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-backend:${{ github.sha }}
      FRONTEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-frontend:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeCheck backend
        run: make typecheck-backend

      - name: TypeCheck frontend
        run: make typecheck-frontend

      - name: Run unit tests (backend)
        run: make test-backend

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend

      # Store dist artifacts for Docker build stage
      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Build Docker images
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push backend Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t ${{ env.BACKEND_ACR_IMAGE }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }} \
            .

      - name: Build & push frontend Docker image
        run: |
          docker build \
            -f Dockerfile.frontend \
            -t ${{ env.FRONTEND_ACR_IMAGE }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }} \
            .

      - name: Push images to ACR
        run: |
          docker push ${{ env.BACKEND_ACR_IMAGE }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }}
          docker push ${{ env.FRONTEND_ACR_IMAGE }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }}

      # Trivy scan on images
      - name: Trivy vulnerability scan (backend image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.BACKEND_ACR_IMAGE }}'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Trivy vulnerability scan (frontend image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.FRONTEND_ACR_IMAGE }}'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload Trivy image results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'

      - name: Upload Trivy frontend results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'

      # Lock immutable tag in ACR
      - name: Lock immutable image tags in ACR
        run: |
          for IMG in "${{ env.BACKEND_IMAGE_NAME }}" "${{ env.FRONTEND_IMAGE_NAME }}"; do
            az acr repository update \
              --name "${{ env.ACR_NAME }}" \
              --image "${IMG}:${{ env.IMAGE_TAG }}" \
              --delete-enabled false \
              --write-enabled false \
              --output none
            echo "Immutable tag ${{ env.IMAGE_TAG }} locked for ${IMG}"
          done

  # ---------------------------------------------------------------------------
  # Stage 2: Database Bootstrap (creates DB + user if not exists)
  # ---------------------------------------------------------------------------
  db-bootstrap:
    name: '2/5 DB Bootstrap'
    needs: build-and-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      BACKEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-backend:${{ github.sha }}
    # Reuses the top-level ENV_SUFFIX logic (env context is available at job field level)
    environment: ${{ env.ENV_SUFFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap PostgreSQL database and Entra principal
        run: |
          set -euo pipefail
          POSTGRES_HOST=$(az postgres flexible-server show \
            --name "${{ secrets.POSTGRES_SERVER_NAME }}" \
            --resource-group "rg-guestportal-${{ env.ENV_SUFFIX }}" \
            --query "fullyQualifiedDomainName" --output tsv 2>/dev/null || echo "")

          if [ -z "$POSTGRES_HOST" ]; then
            echo "PostgreSQL server not found — bootstrap failed."
            exit 1
          fi

          # Connect as the Entra admin (group or user) using an Entra access
          # token as the password — no password user is created anywhere.
          PGUSER="${{ secrets.POSTGRES_ADMIN_USER }}"
          PGPASSWORD=$(az account get-access-token \
            --resource-type oss-rdbms \
            --query accessToken --output tsv)
          export PGPASSWORD
          export PGSSLMODE=require

          DB_NAME="guestportal_${{ env.ENV_SUFFIX }}"
          # The DB login role MUST equal the backend UAMI name for Entra auth.
          APP_LOGIN="uami-guestportal-backend-${{ env.ENV_SUFFIX }}"
          PSQL_BASE=(psql -h "$POSTGRES_HOST" -p 5432 -U "$PGUSER" -v ON_ERROR_STOP=1)

          echo "Bootstrapping DB '${DB_NAME}' and Entra principal '${APP_LOGIN}' on ${POSTGRES_HOST}..."

          # 1. Create the database if it does not exist.
          "${PSQL_BASE[@]}" -d postgres \
            -c "SELECT 'CREATE DATABASE ${DB_NAME}' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${DB_NAME}')\gexec"

          # 2. Create the Entra principal mapped to the backend UAMI (idempotent).
          #    pgaadauth_create_principal errors if the role already exists, so guard it.
          ROLE_EXISTS=$("${PSQL_BASE[@]}" -d postgres -tAc \
            "SELECT 1 FROM pg_roles WHERE rolname = '${APP_LOGIN}'")
          if [ "$ROLE_EXISTS" != "1" ]; then
            echo "Creating Entra principal '${APP_LOGIN}'..."
            "${PSQL_BASE[@]}" -d postgres \
              -c "SELECT * FROM pgaadauth_create_principal('${APP_LOGIN}', false, false)"
          else
            echo "Entra principal '${APP_LOGIN}' already exists — skipping."
          fi

          # 3. Grant the principal the privileges it needs on the app database.
          "${PSQL_BASE[@]}" -d postgres \
            -c "GRANT CONNECT ON DATABASE \"${DB_NAME}\" TO \"${APP_LOGIN}\";"
          "${PSQL_BASE[@]}" -d "$DB_NAME" \
            -c "GRANT ALL ON SCHEMA public TO \"${APP_LOGIN}\"; GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO \"${APP_LOGIN}\"; GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO \"${APP_LOGIN}\"; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO \"${APP_LOGIN}\"; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO \"${APP_LOGIN}\";"

          unset PGPASSWORD
          echo "Database bootstrap complete."

      - name: Create or update ACA job for DB migration
        run: |
          az containerapp job create \
            --name "job-guestportal-migrate-${{ env.ENV_SUFFIX }}" \
            --resource-group "rg-guestportal-${{ env.ENV_SUFFIX }}" \
            --environment "cae-guestportal-${{ env.ENV_SUFFIX }}" \
            --trigger-type "Manual" \
            --replica-timeout 300 \
            --image "${{ env.BACKEND_ACR_IMAGE }}" \
            --command "node backend/dist/db/migrate.js" \
            --registry-server "${{ secrets.ACR_NAME }}.azurecr.io" \
            --env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --mi-user-assigned "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-guestportal-${{ env.ENV_SUFFIX }}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/uami-guestportal-backend-${{ env.ENV_SUFFIX }}" \
            --output none 2>/dev/null || \
          az containerapp job update \
            --name "job-guestportal-migrate-${{ env.ENV_SUFFIX }}" \
            --resource-group "rg-guestportal-${{ env.ENV_SUFFIX }}" \
            --image "${{ env.BACKEND_ACR_IMAGE }}" \
            --output none

  # ---------------------------------------------------------------------------
  # Stage 3: Database Migration (idempotent)
  # ---------------------------------------------------------------------------
  db-migrate:
    name: '3/5 DB Migration'
    needs: [build-and-scan, db-bootstrap]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # Reuses the top-level ENV_SUFFIX logic (env context is available at job field level)
    environment: ${{ env.ENV_SUFFIX }}

    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run database migration (ACA job)
        run: |
          az containerapp job start \
            --name "job-guestportal-migrate-${{ env.ENV_SUFFIX }}" \
            --resource-group "rg-guestportal-${{ env.ENV_SUFFIX }}" \
            --output none

  # ---------------------------------------------------------------------------
  # Stage 4: Deploy to Azure Container Apps
  # ---------------------------------------------------------------------------
  deploy:
    name: '4/5 Deploy to ACA'
    needs: [build-and-scan, db-migrate]
    runs-on: ubuntu-latest
    env:
      BACKEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-backend:${{ github.sha }}
      FRONTEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-frontend:${{ github.sha }}
    # Reuses the top-level ENV_SUFFIX logic (env context is available at job field level)
    environment: ${{ env.ENV_SUFFIX }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Configure backend env vars AND deploy in a single command ─────
      # We combine --set-env-vars with --image so that a single ACA revision
      # gets both the new env vars and the new image atomically.
      - name: Deploy backend to ACA (with env vars)
        run: |
          KV="kv-guestportal-${{ env.ENV_SUFFIX }}"
          az containerapp update \
            --name "ca-guestportal-backend-${{ env.ENV_SUFFIX }}" \
            --resource-group "rg-guestportal-${{ env.ENV_SUFFIX }}" \
            --image "${{ env.BACKEND_ACR_IMAGE }}" \
            --set-env-vars \
              NODE_ENV=production \
              PORT=3000 \
              LOG_LEVEL=info \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              SESSION_SECRET="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SESSION-SECRET/)" \
              SAML_ENTRY_POINT="${{ secrets.SAML_ENTRY_POINT }}" \
              SAML_ISSUER="${{ secrets.SAML_ISSUER }}" \
              SAML_CALLBACK_URL="${{ secrets.SAML_CALLBACK_URL }}" \
              SAML_CERT="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-CERT/)" \
              SAML_DECRYPTION_KEY="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-DECRYPTION-KEY/)" \
              SAML_LOGOUT_URL="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-LOGOUT-URL/)" \
              SAML_LOGOUT_CALLBACK_URL="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-LOGOUT-CALLBACK-URL/)" \
              WLC_DEFAULT_PASSWORD="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/WLC-DEFAULT-PASSWORD/)" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/APPINSIGHTS-CONNECTION-STRING/)" \
              MAIL_GRAPH_ENABLED=false \
              MAIL_GRAPH_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
              MAIL_GRAPH_CLIENT_ID="${{ secrets.MAIL_GRAPH_CLIENT_ID }}" \
              MAIL_GRAPH_CLIENT_SECRET="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/MAIL-GRAPH-CLIENT-SECRET/)" \
              MAIL_GRAPH_USER_ID="${{ secrets.MAIL_GRAPH_USER_ID }}" \
              MAIL_GRAPH_FROM_ADDRESS="noreply@dompe.com" \
              BACKEND_BASE_URL="http://ca-guestportal-backend-${{ env.ENV_SUFFIX }}.${{ secrets.ACA_ENVIRONMENT_DEFAULT_DOMAIN }}" \
              SKIP_MIGRATIONS=true \
              SEED_ENABLED=false \
              --output none
          echo "Backend deployed with env vars."

      - name: Deploy frontend to ACA
        run: |
          az containerapp update \
            --name "ca-guestportal-frontend-${{ env.ENV_SUFFIX }}" \
            --resource-group "rg-guestportal-${{ env.ENV_SUFFIX }}" \
            --image "${{ env.FRONTEND_ACR_IMAGE }}" \
            --output none

      - name: Wait for deployments to be active
        run: |
          for APP in "ca-guestportal-backend-${{ env.ENV_SUFFIX }}" "ca-guestportal-frontend-${{ env.ENV_SUFFIX }}"; do
            echo "Waiting for $APP..."
            sleep 15
            for i in $(seq 1 12); do
              STATUS=$(az containerapp show \
                --name "$APP" \
                --resource-group "rg-guestportal-${{ env.ENV_SUFFIX }}" \
                --query "properties.latestRevisionFqdn" \
                --output tsv 2>/dev/null || echo "waiting")
              echo "[$i] $APP FQDN: $STATUS"
              if [ -n "$STATUS" ] && [ "$STATUS" != "waiting" ]; then
                echo "$APP ready"
                break
              fi
              sleep 10
            done
          done

  # ---------------------------------------------------------------------------
  # Stage 5: Post-deploy Verification (informational)
  # ---------------------------------------------------------------------------
  # Note: App Gateway backend pool updates are managed by the platform
  # infrastructure team — the application pipeline must not modify them.
  # The ACA apps are internal-only, so this job does NOT run health checks
  # from the public runner (that produced false greens). See the step below.
  post-deploy-verify:
    name: '5/5 Post-deploy Verify'
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Report deployment revisions
        run: |
          echo "Deploy stage completed. The ACA container apps expose an" \
               "INTERNAL-only ingress inside the Non-GxP spoke and are NOT" \
               "reachable from a GitHub-hosted runner."
          echo ""
          echo "Post-deploy health verification is performed either:"
          echo "  - by the platform (Application Gateway / probes), or"
          echo "  - from a self-hosted runner with VNet line-of-sight to the"
          echo "    ACA environment (curl https://<fqdn>/api/healthz)."
          echo ""
          echo "This job intentionally does NOT curl the private FQDN from a"
          echo "public runner, which would either fail or (with -k) produce a"
          echo "misleading green result."
          echo ""
          echo "To re-enable an automated check, move this job onto a"
          echo "self-hosted runner (runs-on: [self-hosted, vnet]) and query"
          echo "https://<backend-fqdn>/api/healthz and /api/readyz WITHOUT -k."
