# =============================================================================
# Azure Container Platform — Standard CI/CD Pipeline (consume-only)
# =============================================================================
# Standard pipeline per le applicazioni sulla piattaforma Azure Container.
# Triggered on push to main/staging branches or via workflow_dispatch.
#
# Operating model: CONSUME-ONLY.
#   The platform (infrastructure team) pre-provisions ALL Azure resources:
#   Resource Group, Key Vault, ACA environment, the two Container Apps, the
#   UAMIs, the PostgreSQL server + database + Entra role mapped to the backend
#   UAMI, the migration ACA job, the ACR and the Application Gateway.
#   This pipeline does NOT create any resource. It only:
#     build image → push to ACR → run schema migration → update the existing
#     Container Apps (`az containerapp update --image` + Key Vault references).
#
# Stages:
#   1. Build & Vulnerability Scan (typecheck + tests + compile + Trivy + push)
#   2. Database Migration (start the pre-provisioned ACA migration job)
#   3. Deploy to ACA (update existing container apps)
#   4. Post-deploy Verify (informational — internal-only apps, no public probe)
#
# ── Required GitHub Secrets ──────────────────────────────────────────────────
# These secrets MUST be configured in your GitHub repository
# (Settings → Secrets and variables → Actions). Platform resource names are
# PARAMETRIZED — the real names are supplied by the infrastructure team; no
# real name is hard-coded here.
#
#   AZURE_CLIENT_ID                 OIDC client ID (federated credential)
#   AZURE_TENANT_ID                 Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID           Azure subscription ID
#   ACR_NAME                        Azure Container Registry name
#   RG_NAME                         Resource group (platform-provided)
#   KV_NAME                         Key Vault (platform-provided)
#   ACA_ENVIRONMENT_DEFAULT_DOMAIN  ACA environment default domain
#   ACA_BACKEND_NAME                Backend Container App name (platform-provided)
#   ACA_FRONTEND_NAME               Frontend Container App name (platform-provided)
#   MIGRATION_JOB_NAME              Pre-provisioned migration ACA job name
#   DATABASE_URL                    PostgreSQL connection string (Entra ID, NO password).
#                                   The user MUST be the backend UAMI name, e.g.
#                                   postgres://uami-guestportal-backend-prod@<host>...:5432/guestportal_prod
#                                   The DB, the Entra role mapped to that UAMI and
#                                   its grants are provisioned by the platform.
#   SAML_ENTRY_POINT                Entra ID SAML SSO endpoint URL
#   SAML_ISSUER                     Application Entity ID
#   SAML_CALLBACK_URL               ACS callback URL
#   MAIL_GRAPH_CLIENT_ID            Graph API App Registration client ID (for email)
#   MAIL_GRAPH_USER_ID              Graph API mailbox user ID/UPN (for email)
# =============================================================================
# ── ACA Environment Variables (set by pipeline via --set-env-vars) ───────────
# The deploy step sets these on the backend ACA container app. Secrets that
# should come from Key Vault use the @Microsoft.KeyVault(...) reference format.
#
#   DATABASE_URL                     From GitHub secret (plain URL, no password)
#   SESSION_SECRET                   Key Vault reference
#   SAML_ENTRY_POINT                 From GitHub secret (non-secret URL)
#   SAML_ISSUER                      From GitHub secret (non-secret URI)
#   SAML_CALLBACK_URL                From GitHub secret (non-secret URL)
#   SAML_CERT                        Key Vault reference
#   SAML_DECRYPTION_KEY              Key Vault reference (optional)
#   SAML_LOGOUT_URL                  Key Vault reference (optional)
#   SAML_LOGOUT_CALLBACK_URL         Key Vault reference (optional)
#   WLC_DEFAULT_PASSWORD             Key Vault reference
#   APPLICATIONINSIGHTS_CONNECTION_STRING  Key Vault reference (optional)
#   BACKEND_BASE_URL                 Built from ACA_ENVIRONMENT_DEFAULT_DOMAIN
#   NODE_ENV, PORT, LOG_LEVEL        Plain values
#   SKIP_MIGRATIONS, SEED_ENABLED    Plain values (true and false by default — CI handles migrations)
#
#   MAIL_GRAPH_ENABLED               Plain value (false by default)
#   MAIL_GRAPH_TENANT_ID             From GitHub secret (reuses AZURE_TENANT_ID)
#   MAIL_GRAPH_CLIENT_ID             From GitHub secret
#   MAIL_GRAPH_CLIENT_SECRET         Key Vault reference
#   MAIL_GRAPH_USER_ID               From GitHub secret
#   MAIL_GRAPH_FROM_ADDRESS          Plain value

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - '*.md'
      - '.github/workflows/e2e-*.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev, staging, or production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - production
  workflow_call:
    inputs:
      environment:
        description: 'Target environment suffix (dev, stg, or prod)'
        required: true
        type: string

env:
  # ---- Environment suffix: resolves to (dev|stg|prod) ----
  # NOTE: Only ENV_SUFFIX, IMAGE_TAG, BACKEND_IMAGE_NAME, FRONTEND_IMAGE_NAME
  # are defined here because they only use `github` / `inputs` contexts.
  # Env vars that reference `env.*`, `secrets.*`, or combine multiple
  # contexts are defined in each job's `env` section where those contexts
  # ARE supported.
  ENV_SUFFIX: ${{ github.event_name == 'workflow_call' && inputs.environment || github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'dev' && 'dev' || github.event.inputs.environment == 'staging' && 'stg' || 'prod') || (github.ref_name == 'main' && 'prod' || 'stg') }}

  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE_NAME: guestportal-backend
  FRONTEND_IMAGE_NAME: guestportal-frontend

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build & Vulnerability Scan (typecheck + tests + compile + Trivy)
  # ---------------------------------------------------------------------------
  build-and-scan:
    name: '1/4 Build & Scan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      BACKEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-backend:${{ github.sha }}
      FRONTEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-frontend:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeCheck backend
        run: make typecheck-backend

      - name: TypeCheck frontend
        run: make typecheck-frontend

      - name: Run unit tests (backend)
        run: make test-backend

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend

      # Store dist artifacts for Docker build stage
      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Build Docker images
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push backend Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t ${{ env.BACKEND_ACR_IMAGE }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }} \
            .

      - name: Build & push frontend Docker image
        run: |
          docker build \
            -f Dockerfile.frontend \
            -t ${{ env.FRONTEND_ACR_IMAGE }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }} \
            .

      - name: Push images to ACR
        run: |
          docker push ${{ env.BACKEND_ACR_IMAGE }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }}
          docker push ${{ env.FRONTEND_ACR_IMAGE }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.ENV_SUFFIX }}

      # Trivy scan on images
      - name: Trivy vulnerability scan (backend image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.BACKEND_ACR_IMAGE }}'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Trivy vulnerability scan (frontend image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.FRONTEND_ACR_IMAGE }}'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload Trivy image results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'

      - name: Upload Trivy frontend results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'

      # NOTE: Image-tag immutability / retention on the SHARED ACR is managed by
      # the platform (infrastructure team). The application pipeline does NOT
      # change registry policies (`az acr repository update`).

  # ---------------------------------------------------------------------------
  # Stage 2: Database Migration
  # ---------------------------------------------------------------------------
  # The migration ACA job is PRE-PROVISIONED by the platform and references the
  # environment image alias (e.g. guestportal-backend:${ENV_SUFFIX}) with the
  # backend UAMI and DATABASE_URL already configured. Stage 1 has just pushed
  # the new alias, so starting the job runs the new migration (DDL in the app's
  # own database — allowed; not infrastructure provisioning). The DB, the Entra
  # role mapped to the UAMI and its grants are provided by the platform.
  db-migrate:
    name: '2/4 DB Migration'
    needs: build-and-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # Reuses the top-level ENV_SUFFIX logic (env context is available at job field level)
    environment: ${{ env.ENV_SUFFIX }}

    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run database migration (start pre-provisioned ACA job)
        run: |
          az containerapp job start \
            --name "${{ secrets.MIGRATION_JOB_NAME }}" \
            --resource-group "${{ secrets.RG_NAME }}" \
            --output none

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy to Azure Container Apps (update existing apps)
  # ---------------------------------------------------------------------------
  deploy:
    name: '3/4 Deploy to ACA'
    needs: [build-and-scan, db-migrate]
    runs-on: ubuntu-latest
    env:
      BACKEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-backend:${{ github.sha }}
      FRONTEND_ACR_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/guestportal-frontend:${{ github.sha }}
    # Reuses the top-level ENV_SUFFIX logic (env context is available at job field level)
    environment: ${{ env.ENV_SUFFIX }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Configure backend env vars AND deploy in a single command ─────
      # We combine --set-env-vars with --image so that a single ACA revision
      # gets both the new env vars and the new image atomically. The container
      # app itself is pre-provisioned by the platform — we only update it.
      - name: Deploy backend to ACA (with env vars)
        run: |
          KV="${{ secrets.KV_NAME }}"
          az containerapp update \
            --name "${{ secrets.ACA_BACKEND_NAME }}" \
            --resource-group "${{ secrets.RG_NAME }}" \
            --image "${{ env.BACKEND_ACR_IMAGE }}" \
            --set-env-vars \
              NODE_ENV=production \
              PORT=3000 \
              LOG_LEVEL=info \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              SESSION_SECRET="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SESSION-SECRET/)" \
              SAML_ENTRY_POINT="${{ secrets.SAML_ENTRY_POINT }}" \
              SAML_ISSUER="${{ secrets.SAML_ISSUER }}" \
              SAML_CALLBACK_URL="${{ secrets.SAML_CALLBACK_URL }}" \
              SAML_CERT="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-CERT/)" \
              SAML_DECRYPTION_KEY="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-DECRYPTION-KEY/)" \
              SAML_LOGOUT_URL="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-LOGOUT-URL/)" \
              SAML_LOGOUT_CALLBACK_URL="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/SAML-LOGOUT-CALLBACK-URL/)" \
              WLC_DEFAULT_PASSWORD="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/WLC-DEFAULT-PASSWORD/)" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/APPINSIGHTS-CONNECTION-STRING/)" \
              MAIL_GRAPH_ENABLED=false \
              MAIL_GRAPH_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
              MAIL_GRAPH_CLIENT_ID="${{ secrets.MAIL_GRAPH_CLIENT_ID }}" \
              MAIL_GRAPH_CLIENT_SECRET="@Microsoft.KeyVault(SecretUri=https://${KV}.vault.azure.net/secrets/MAIL-GRAPH-CLIENT-SECRET/)" \
              MAIL_GRAPH_USER_ID="${{ secrets.MAIL_GRAPH_USER_ID }}" \
              MAIL_GRAPH_FROM_ADDRESS="noreply@dompe.com" \
              BACKEND_BASE_URL="http://${{ secrets.ACA_BACKEND_NAME }}.${{ secrets.ACA_ENVIRONMENT_DEFAULT_DOMAIN }}" \
              SKIP_MIGRATIONS=true \
              SEED_ENABLED=false \
              --output none
          echo "Backend deployed with env vars."

      - name: Deploy frontend to ACA
        run: |
          az containerapp update \
            --name "${{ secrets.ACA_FRONTEND_NAME }}" \
            --resource-group "${{ secrets.RG_NAME }}" \
            --image "${{ env.FRONTEND_ACR_IMAGE }}" \
            --output none

      - name: Wait for deployments to be active
        run: |
          for APP in "${{ secrets.ACA_BACKEND_NAME }}" "${{ secrets.ACA_FRONTEND_NAME }}"; do
            echo "Waiting for $APP..."
            sleep 15
            for i in $(seq 1 12); do
              STATUS=$(az containerapp show \
                --name "$APP" \
                --resource-group "${{ secrets.RG_NAME }}" \
                --query "properties.latestRevisionFqdn" \
                --output tsv 2>/dev/null || echo "waiting")
              echo "[$i] $APP FQDN: $STATUS"
              if [ -n "$STATUS" ] && [ "$STATUS" != "waiting" ]; then
                echo "$APP ready"
                break
              fi
              sleep 10
            done
          done

  # ---------------------------------------------------------------------------
  # Stage 4: Post-deploy Verification (informational)
  # ---------------------------------------------------------------------------
  # Note: App Gateway backend pool updates are managed by the platform
  # infrastructure team — the application pipeline must not modify them.
  # The ACA apps are internal-only, so this job does NOT run health checks
  # from the public runner (that produced false greens). See the step below.
  post-deploy-verify:
    name: '4/4 Post-deploy Verify'
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Report deployment revisions
        run: |
          echo "Deploy stage completed. The ACA container apps expose an" \
               "INTERNAL-only ingress inside the Non-GxP spoke and are NOT" \
               "reachable from a GitHub-hosted runner."
          echo ""
          echo "Post-deploy health verification is performed either:"
          echo "  - by the platform (Application Gateway / probes), or"
          echo "  - from a self-hosted runner with VNet line-of-sight to the"
          echo "    ACA environment (curl https://<fqdn>/api/healthz)."
          echo ""
          echo "This job intentionally does NOT curl the private FQDN from a"
          echo "public runner, which would either fail or (with -k) produce a"
          echo "misleading green result."
          echo ""
          echo "To re-enable an automated check, move this job onto a"
          echo "self-hosted runner (runs-on: [self-hosted, vnet]) and query"
          echo "https://<backend-fqdn>/api/healthz and /api/readyz WITHOUT -k."
