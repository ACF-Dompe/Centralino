# =============================================================================
# E2E — SSO SAML Login Screen (Playwright)
# =============================================================================
# Dedicated lightweight workflow for the SSO SAML E2E tests.
#
# The SSO tests use Playwright's page.route() to intercept API calls and
# simulate SAML authentication states (401 = not authenticated, 404 = SSO
# not configured). They DO NOT require:
#   - A running backend (Node.js / Express)
#   - A PostgreSQL database
#   - A real Entra ID tenant
#
# Only the built frontend served via Vite preview is needed.
# =============================================================================

name: E2E — SSO Login Screen

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/src/**'
      - 'frontend/e2e/**'
      - '.github/workflows/e2e-sso.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/src/**'
      - 'frontend/e2e/**'
      - '.github/workflows/e2e-sso.yml'
  workflow_dispatch:

concurrency:
  group: e2e-sso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sso-e2e:
    name: SSO Login Screen (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeCheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build -w frontend

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      # Start Vite preview (frontend only, no backend needed)
      - name: Start frontend
        run: |
          cd frontend && npx vite preview --port 3000 &
          echo "Frontend PID: $!"
          # Wait for the frontend to be ready
          for i in $(seq 1 15); do
            sleep 1
            FRONTEND_OK=$(curl -fsS -m 3 http://localhost:3000/ >/dev/null 2>&1 && echo 1 || echo 0)
            echo "[$i] frontend=$FRONTEND_OK"
            [ "$FRONTEND_OK" = "1" ] && break
          done
          curl -fsS -m 5 http://localhost:3000/ | head -c 200 && echo " FRONTEND SERVING"

      - name: Run SSO E2E tests
        working-directory: frontend
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:3000
        run: npx playwright test e2e/sso.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-sso
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
